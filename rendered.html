<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — Luxe Parfum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #c5a059;
            --primary-dark: #a68545;
            --bg-dark: #0f1115;
            --card-bg: rgba(25, 28, 35, 0.7);
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo-box i {
            font-size: 40px;
            color: var(--primary);
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.3));
            margin-bottom: 15px;
        }

        .logo-box h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, #c5a059 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            padding-right: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 45px 14px 15px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(197, 160, 89, 0.05);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.1);
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
            filter: brightness(1.1);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border-right: 4px solid #dc3545;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ff6b6b;
            text-align: right;
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* Particles effect background */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-box">
                <i class="fas fa-crown"></i>
                <h1>LUXE PARFUM</h1>
            </div>

            <div class="login-header">
                <h2>مرحباً بك مجدداً</h2>
                <p>يرجى تسجيل الدخول للوصول إلى حسابك</p>
            </div>

            
            <form action="http://127.0.0.1:8000/login" method="POST">
                <input type="hidden" name="_token" value="QgCfgo2Odr07DPInqI4XrVE6RgJ6l265EjsH6eIv" autocomplete="off">                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" name="email" value="" required placeholder="your@email.com">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" required placeholder="••••••••">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; color: var(--text-muted);">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember" style="margin: 0; cursor: pointer;">تذكرني</label>
                </div>

                <button type="submit" class="btn-login">
                    <span>تسجيل الدخول</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div class="footer-links" style="display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; justify-content: space-between;">
                    <a href="#">نسيت كلمة المرور؟</a>
                    <a href="http://127.0.0.1:8000">العودة للرئيسية</a>
                </div>
                <p style="margin-top: 15px; font-size: 14px; color: var(--text-muted);">
                    ليس لديك حساب؟ <a href="http://127.0.0.1:8000/register" style="color: var(--primary); font-weight: 600;">إنشاء حساب جديد</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Simple background decoration
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const dot = document.createElement('div');
            dot.style.position = 'absolute';
            dot.style.width = Math.random() * 3 + 'px';
            dot.style.height = dot.style.width;
            dot.style.background = 'rgba(197, 160, 89, 0.15)';
            dot.style.borderRadius = '50%';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.animation = `pulse ${3 + Math.random() * 5}s infinite ease-in-out`;
            container.appendChild(dot);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { opacity: 0.1; transform: scale(1); }
                50% { opacity: 0.5; transform: scale(1.5); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
